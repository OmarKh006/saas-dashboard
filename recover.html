<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles/recover.css" />
    <title>Recover</title>
  </head>
  <body>
    <div class="container">
      <main class="main">
        <header class="header">
          <img class="logoImg" src="/assets/Logo.svg" alt="logo image" />
          <h1 class="h1--heading">Recover</h1>
        </header>
        <form action="#" class="submitEmail">
          <label for="email" class="eLabel">Email Address</label>
          <input
            class="emailInput"
            type="email"
            id="email"
            name="email"
            placeholder="example@gmail.com"
          />
          <button class="submitBtn" type="submit">Reset Your Password</button>
        </form>
      </main>
    </div>
  </body>
</html>
